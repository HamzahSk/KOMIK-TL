name: Manga Auto Translator Workflow

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'config.py' # Hanya berjalan otomatis jika config.py diubah
  workflow_dispatch: # Memungkinkan kamu menjalankan workflow secara manual via tab Actions

jobs:
  translate:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Translator Script
        run: python main.py
        
      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-translations
          path: output/
          retention-days: 7
          