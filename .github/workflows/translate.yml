name: Manga Auto Translator Workflow

on:
  push:
    branches:
      - main
      - master
    paths:
      - config.py
      - requirements.txt
      - main.py
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # Cache model OCR untuk RapidOCR (model biasanya tersimpan di ~/.cache)
      - name: Cache RapidOCR Models
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: rapidocr-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            rapidocr-cache-${{ runner.os }}-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-liberation \
            libgl1 \
            libglib2.0-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Translator Script
        run: |
          python main.py

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-translations
          path: output/
          retention-days: 7
