name: Manga Auto Translator Workflow

on:
  push:
    branches:
      - main
      - master
    paths:
      - config.py
      - requirements.txt
      - main.py
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # [UPDATED] Cache folder diubah menjadi ~/.paddleocr
      - name: Cache OCR Models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            ~/.paddleocr
          key: ocr-cache-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ocr-cache-${{ runner.os }}-

      # [UPDATED] Tambahan libgomp1 untuk dependensi PaddlePaddle CPU
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-liberation \
            libgl1 \
            libglib2.0-0 \
            libgomp1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Translator Script
        run: |
          python main.py

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-translations
          path: output/
          retention-days: 7
