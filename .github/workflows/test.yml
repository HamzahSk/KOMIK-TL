name: Run test.py

on:
  push:
    paths:
      - "test.py"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ganti pillow dan numpy dengan versi OpenCV khusus server
          pip install opencv-python-headless

      - name: Run test.py
        run: |
          python test.py

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: |
            *.jpg
            *.jpeg
            *.png
            *.webp
